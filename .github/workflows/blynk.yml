name: Blynk CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  blynk-publish:
    name: Connect to Blynk (real token)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run Blynk device script
        env:
          BLYNK_AUTH_TOKEN: ${{ secrets.BLYNK_AUTH_TOKEN }}
          BLYNK_TEMPLATE_ID: ${{ secrets.BLYNK_TEMPLATE_ID }}
        run: python blynk_device.py

  blynk-failure-test:
    name: Failure test (invalid token)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run with bad token (should fail)
        id: bad_run
        continue-on-error: true
        env:
          BLYNK_AUTH_TOKEN: "INVALID_TOKEN_FOR_TESTING"
          BLYNK_TEMPLATE_ID: ${{ secrets.BLYNK_TEMPLATE_ID }}
        run: python blynk_device.py
      - name: Verify failure was caught
        run: |
          if [ "${{ steps.bad_run.outcome }}" == "success" ]; then
            echo "ERROR: Bad token should have failed!"
            exit 1
          else
            echo "PASS: Bad token correctly caused a failure."
          fi
